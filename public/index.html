<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>TREEZCOIN</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
      overflow-x: hidden;
      background:
        radial-gradient(circle at center, rgba(10, 105, 43, 0.7), transparent 28%),
        radial-gradient(circle at top, rgba(115, 61, 18, 0.75), transparent 36%),
        repeating-radial-gradient(circle at center, #0f3d20 0 18px, #0a2915 18px 34px);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(45deg, rgba(255, 215, 0, 0.08), transparent 30%, rgba(255, 0, 0, 0.08)),
        radial-gradient(circle at center, transparent 0 28%, rgba(0,0,0,0.55) 75%);
      z-index: 0;
    }

    #coinRain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 1;
    }

    .bgCoin {
      position: absolute;
      top: -60px;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #fff7a8, #facc15 42%, #b45309 100%);
      color: #3b2400;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 14px rgba(250, 204, 21, 0.8);
      animation: coinFall linear forwards;
      opacity: 0.75;
    }

    @keyframes coinFall {
      to {
        transform: translateY(110vh) rotate(720deg);
        opacity: 0;
      }
    }

    .container {
      position: relative;
      z-index: 2;
      max-width: 1150px;
      margin: auto;
      padding: 24px;
    }

    .table {
      border-radius: 32px;
      padding: 18px;
      background:
        radial-gradient(circle at center, rgba(11, 72, 31, 0.96), rgba(2, 18, 7, 0.98)),
        linear-gradient(90deg, #5c2e10, #2a1306);
      border: 10px solid rgba(85, 42, 14, 0.95);
      box-shadow:
        inset 0 0 50px rgba(0,0,0,0.6),
        0 0 40px rgba(0,0,0,0.55);
    }

    h1 {
      font-size: 64px;
      margin: 8px 0 4px;
      letter-spacing: 4px;
      color: #7cff4f;
      text-shadow:
        0 0 8px #7cff4f,
        0 0 20px #39ff14,
        0 0 45px #00ff88;
      animation: titlePulse 1.3s infinite alternate;
    }

    @keyframes titlePulse {
      from {
        transform: scale(1);
        filter: brightness(1);
      }
      to {
        transform: scale(1.025);
        filter: brightness(1.35);
      }
    }

    .subtitle {
      color: #eaffd7;
      margin-bottom: 18px;
      font-size: 17px;
    }

    .panel {
      background: rgba(3, 12, 5, 0.82);
      border: 1px solid rgba(250, 204, 21, 0.28);
      box-shadow: 0 0 24px rgba(0, 255, 80, 0.12);
      border-radius: 20px;
      padding: 18px;
      margin-top: 18px;
      backdrop-filter: blur(8px);
    }

    input {
      padding: 13px;
      font-size: 16px;
      border-radius: 10px;
      border: 2px solid #facc15;
      outline: none;
      width: 230px;
      background: #051005;
      color: white;
      text-align: center;
    }

    .saveName {
      padding: 13px 18px;
      margin-left: 8px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      background: linear-gradient(135deg, #facc15, #a16207);
      color: #140d00;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
    }

    .actionBtn {
      position: relative;
      min-height: 118px;
      border: none;
      border-radius: 18px;
      cursor: pointer;
      overflow: hidden;
      color: white;
      text-align: left;
      padding: 14px;
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.16),
        0 12px 26px rgba(0,0,0,0.32);
      transition: 0.14s;
    }

    .actionBtn::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(0,0,0,0.72));
      z-index: 0;
    }

    .actionBtn:hover {
      transform: translateY(-3px) scale(1.025);
      filter: brightness(1.14);
    }

    .actionBtn:active {
      transform: scale(0.97);
    }

    .actionBtn.cooling {
      cursor: not-allowed;
      filter: grayscale(0.3) brightness(0.72);
    }

    .mine {
      background: linear-gradient(135deg, #0f7a3a, #073b1c);
    }

    .greed {
      background: linear-gradient(135deg, #87c900, #315f05);
    }

    .mega {
      background: linear-gradient(135deg, #0095ff, #062b70);
    }

    .steal {
      background: linear-gradient(135deg, #7c3aed, #2e1065);
    }

    .tax {
      background: linear-gradient(135deg, #f59e0b, #7c2d12);
    }

    .rug {
      background: linear-gradient(135deg, #ef4444, #450a0a);
    }

    .jackpot {
      background: linear-gradient(135deg, #ff00cc, #312e81);
    }

    .actionTitle,
    .actionDesc,
    .actionCost {
      position: relative;
      z-index: 2;
      display: block;
    }

    .actionTitle {
      font-size: 20px;
      font-weight: 900;
      text-shadow: 0 2px 8px rgba(0,0,0,0.9);
    }

    .actionDesc {
      margin-top: 8px;
      font-size: 13px;
      color: #e7ffe1;
      line-height: 1.25;
    }

    .actionCost {
      margin-top: 10px;
      font-size: 12px;
      color: #facc15;
      font-weight: bold;
    }

    .cooldownFill {
      position: absolute;
      left: 0;
      bottom: 0;
      height: 6px;
      width: 0%;
      background: linear-gradient(90deg, #facc15, #22c55e);
      box-shadow: 0 0 12px #facc15;
      z-index: 3;
    }

    .playersGrid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }

    .player {
      position: relative;
      padding: 14px;
      background: rgba(8, 18, 8, 0.95);
      border-radius: 14px;
      border: 1px solid rgba(250, 204, 21, 0.24);
      overflow: hidden;
    }

    .player::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(250,204,21,0.12), transparent);
      transform: translateX(-100%);
      animation: shine 2.5s infinite;
    }

    @keyframes shine {
      to {
        transform: translateX(100%);
      }
    }

    .fireLeader {
      position: relative;
      z-index: 2;
      color: #fff2a8;
      font-weight: 900;
      animation: fireText 0.55s infinite alternate;
    }

    @keyframes fireText {
      0% {
        color: #fff7ad;
        text-shadow:
          0 0 5px #fff700,
          0 0 12px #ff9900,
          0 0 22px #ff3300;
      }
      100% {
        color: #ff5a00;
        text-shadow:
          0 0 7px #ffff00,
          0 0 17px #ff7300,
          0 0 32px #ff0000;
      }
    }

    .rgbRunner {
      position: relative;
      z-index: 2;
      font-weight: 900;
      animation: rgbText 1.1s linear infinite;
    }

    @keyframes rgbText {
      0% { color: #ff004c; text-shadow: 0 0 8px #ff004c; }
      20% { color: #ffea00; text-shadow: 0 0 8px #ffea00; }
      40% { color: #00ff66; text-shadow: 0 0 8px #00ff66; }
      60% { color: #00d9ff; text-shadow: 0 0 8px #00d9ff; }
      80% { color: #a855f7; text-shadow: 0 0 8px #a855f7; }
      100% { color: #ff004c; text-shadow: 0 0 8px #ff004c; }
    }

    .normalName {
      position: relative;
      z-index: 2;
      color: #e8ffe1;
      font-weight: 700;
    }

    .player.leaderCard {
      border: 2px solid rgba(255, 160, 0, 0.9);
      animation: fireGlow 0.7s infinite alternate;
    }

    .player.secondCard {
      border: 2px solid rgba(0, 217, 255, 0.75);
      box-shadow: 0 0 20px rgba(0, 217, 255, 0.25);
    }

    @keyframes fireGlow {
      from {
        box-shadow: 0 0 8px rgba(255, 90, 0, 0.35);
      }
      to {
        box-shadow: 0 0 22px rgba(255, 180, 0, 0.75);
      }
    }

    .score {
      position: relative;
      z-index: 2;
      font-size: 24px;
      color: #7cff4f;
      margin-top: 8px;
      font-weight: bold;
    }

    .gain {
      position: relative;
      z-index: 2;
      color: #fff700;
      font-size: 14px;
      height: 18px;
      margin-top: 4px;
    }

    .progressWrap {
      position: relative;
      z-index: 2;
      margin-top: 10px;
      height: 8px;
      background: rgba(255,255,255,0.12);
      border-radius: 999px;
      overflow: hidden;
    }

    .progressFill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #22c55e, #facc15, #ef4444);
      box-shadow: 0 0 12px #facc15;
    }

    .winner {
      font-size: 32px;
      color: #fff700;
      margin-top: 20px;
      font-weight: bold;
      text-shadow: 0 0 16px #fff700;
      animation: winnerPulse 0.8s infinite alternate;
    }

    @keyframes winnerPulse {
      from { transform: scale(1); }
      to { transform: scale(1.05); }
    }

    .log {
      text-align: left;
      color: #d9ffd3;
      font-size: 14px;
      background: rgba(0, 0, 0, 0.35);
      padding: 10px;
      border-radius: 8px;
      margin: 6px 0;
      border-left: 3px solid #facc15;
    }

    .floating {
      position: fixed;
      pointer-events: none;
      font-weight: bold;
      color: #fff700;
      text-shadow: 0 0 8px #fff700;
      animation: floatUp 0.85s ease-out forwards;
      z-index: 9999;
    }

    @keyframes floatUp {
      from {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
      to {
        opacity: 0;
        transform: translateY(-70px) scale(1.45);
      }
    }

    .particle {
      position: fixed;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      pointer-events: none;
      background: #facc15;
      box-shadow: 0 0 12px #facc15;
      animation: particlePop 0.6s ease-out forwards;
      z-index: 9998;
    }

    @keyframes particlePop {
      to {
        transform: translate(var(--x), var(--y)) scale(0);
        opacity: 0;
      }
    }

    .explosionParticle {
      position: fixed;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 99998;
      background: radial-gradient(circle, #fff7ad, #f97316, #dc2626);
      box-shadow: 0 0 16px #facc15;
      animation: explode 0.95s ease-out forwards;
    }

    @keyframes explode {
      to {
        transform: translate(var(--x), var(--y)) scale(0);
        opacity: 0;
      }
    }

    .moneyBoard {
      position: fixed;
      right: 18px;
      top: 18px;
      z-index: 50;
      width: 250px;
      background: rgba(3, 10, 4, 0.88);
      border: 2px solid rgba(250, 204, 21, 0.55);
      border-radius: 18px;
      padding: 12px;
      box-shadow:
        0 0 22px rgba(250, 204, 21, 0.25),
        inset 0 0 18px rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(8px);
    }

    .moneyBoardTitle {
      font-weight: 900;
      color: #facc15;
      margin-bottom: 8px;
      text-shadow: 0 0 8px #facc15;
    }

    .moneyRow {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      padding: 7px 8px;
      margin: 5px 0;
      border-radius: 10px;
      background: rgba(255,255,255,0.06);
      font-size: 13px;
    }

    .moneyRow.leaderRow {
      background: linear-gradient(90deg, rgba(255,70,0,0.35), rgba(255,200,0,0.18));
      border: 1px solid rgba(255, 180, 0, 0.55);
      animation: fireGlow 0.65s infinite alternate;
    }

    .megaEvent {
      position: fixed;
      inset: 0;
      z-index: 99999;
      pointer-events: none;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 54px;
      font-weight: 1000;
      color: #fff700;
      text-shadow:
        0 0 12px #fff700,
        0 0 30px #ff7300,
        0 0 55px #ff0000;
      background: radial-gradient(circle, rgba(255,200,0,0.22), rgba(255,0,0,0.08), transparent 70%);
    }

    .megaEvent.show {
      display: flex;
      animation: megaPop 1.4s ease-out forwards;
    }

    @keyframes megaPop {
      0% {
        opacity: 0;
        transform: scale(0.4) rotate(-8deg);
      }
      20% {
        opacity: 1;
        transform: scale(1.16) rotate(3deg);
      }
      55% {
        opacity: 1;
        transform: scale(1) rotate(0deg);
      }
      100% {
        opacity: 0;
        transform: scale(1.35) rotate(0deg);
      }
    }

    .screenShake {
      animation: screenShake 0.55s linear;
    }

    @keyframes screenShake {
      0% { transform: translate(0, 0); }
      15% { transform: translate(-8px, 5px); }
      30% { transform: translate(8px, -5px); }
      45% { transform: translate(-7px, -4px); }
      60% { transform: translate(7px, 4px); }
      75% { transform: translate(-4px, 3px); }
      100% { transform: translate(0, 0); }
    }

    .warning {
      color: #ffdf70;
      font-weight: bold;
      margin-top: 8px;
    }

    @media (max-width: 900px) {
      .moneyBoard {
        position: relative;
        right: auto;
        top: auto;
        width: auto;
        margin: 12px 18px;
      }
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 42px;
      }

      .actions {
        grid-template-columns: 1fr;
      }

      .saveName {
        margin-top: 10px;
        margin-left: 0;
      }
    }
  </style>
</head>

<body>
  <div id="coinRain"></div>
  <div id="moneyBoard" class="moneyBoard"></div>
  <div id="megaEvent" class="megaEvent"></div>

  <div class="container">
    <div class="table">
      <h1>TREEZCOIN</h1>
      <div class="subtitle">Rulet masası modu. Max 6 oyuncu. Hedef: 10.000.000 TREEZ.</div>

      <div class="panel">
        <input id="nameInput" placeholder="İsmini yaz" maxlength="16" />
        <button class="saveName" onclick="setName()">İsmi Kaydet</button>
      </div>

      <div class="panel">
        <div class="actions">
          <button class="actionBtn mine" onclick="sendAction('mine', event)">
            <span class="actionTitle">TREEZ Kaz</span>
            <span class="actionDesc">Güvenli kazanç. Her tıklama TREEZ üretir.</span>
            <span class="actionCost">Risk: Yok</span>
            <span class="cooldownFill"></span>
          </button>

          <button class="actionBtn greed" onclick="sendAction('greed', event)">
            <span class="actionTitle">Katla</span>
            <span class="actionDesc">Başarılı olursa skor x2 olur, patlarsa düşer.</span>
            <span class="actionCost">Risk: Orta</span>
            <span class="cooldownFill"></span>
          </button>

          <button class="actionBtn mega" onclick="sendAction('mega', event)">
            <span class="actionTitle">Mega Pump</span>
            <span class="actionDesc">Büyük çarpan. Büyük tokat ihtimali de yanında gelir.</span>
            <span class="actionCost">Gerekli: 50 TREEZ</span>
            <span class="cooldownFill"></span>
          </button>

          <button class="actionBtn steal" onclick="sendAction('steal', event)">
            <span class="actionTitle">Cüzdan Çal</span>
            <span class="actionDesc">Rastgele bir oyuncudan TREEZ çalar.</span>
            <span class="actionCost">Rakip bozma</span>
            <span class="cooldownFill"></span>
          </button>

          <button class="actionBtn tax" onclick="sendAction('tax', event)">
            <span class="actionTitle">Lider Vergisi</span>
            <span class="actionDesc">Birinci sıradaki oyuncudan pay alır.</span>
            <span class="actionCost">Lidere karşı</span>
            <span class="cooldownFill"></span>
          </button>

          <button class="actionBtn rug" onclick="sendAction('rug', event)">
            <span class="actionTitle">Rug Pull</span>
            <span class="actionDesc">Herkesi düşürmeye çalışır. Patlarsa sen sıfırlanırsın.</span>
            <span class="actionCost">Gerekli: 100 TREEZ</span>
            <span class="cooldownFill"></span>
          </button>

          <button class="actionBtn jackpot" onclick="sendAction('jackpot', event)">
            <span class="actionTitle">Jackpot</span>
            <span class="actionDesc">Düşük ihtimalle dev kazanç verir.</span>
            <span class="actionCost">Gerekli: 500 TREEZ</span>
            <span class="cooldownFill"></span>
          </button>
        </div>
      </div>

      <div id="winnerBox" class="winner"></div>
      <div id="warningBox" class="warning"></div>

      <div class="panel">
        <h2>Oyuncular</h2>
        <div id="players" class="playersGrid"></div>
      </div>

      <div class="panel">
        <h2>Masa Geçmişi</h2>
        <div id="logs"></div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="game.js"></script>
</body>
</html>
